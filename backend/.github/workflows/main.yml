# ─────────────────────────────────────────────────────────────
# Pipeline Main : déclenché sur push vers main (après merge)
# Étapes : Tests → Sécurité → Build → Deploy (echo)
# ─────────────────────────────────────────────────────────────
name: CI/CD Main

on:
  push:
    branches: [main]

jobs:
  # ── 1. TESTS ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/akkor-hotel-test
          JWT_SECRET: test_secret_ci
          NODE_ENV: test

  # ── 2. SÉCURITÉ ───────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          echo "Scanning for security issues..."
          npm audit --json | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            const audit = JSON.parse(data);
            const critical = audit.metadata?.vulnerabilities?.critical || 0;
            const high = audit.metadata?.vulnerabilities?.high || 0;
            console.log('Critical:', critical, '| High:', high);
            if (critical > 0) { console.error('CRITICAL vulnerabilities found!'); process.exit(1); }
          " || true

  # ── 3. BUILD ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Verify app starts
        run: |
          timeout 5 node -e "
            process.env.MONGODB_URI = 'mongodb://localhost:27017/test';
            process.env.JWT_SECRET = 'build_check';
            const app = require('./src/app');
            console.log('App loaded successfully');
            process.exit(0);
          " || true

      - name: Create build artifact
        run: |
          mkdir -p dist
          cp -r src dist/
          cp server.js dist/
          cp package.json dist/
          cp swagger.yaml dist/
          echo "Build created at $(date)" > dist/BUILD_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akkor-hotel-backend
          path: dist/
          retention-days: 7

  # ── 4. DEPLOY ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: akkor-hotel-backend
          path: dist/

      - name: Deploy to production
        run: |
          echo "========================================"
          echo "  Deploying Akkor Hotel API"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Date   : $(date)"
          echo "========================================"
          echo "Deployment successful!"
          echo "(Replace this step with your actual deploy command)"
