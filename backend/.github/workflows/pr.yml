# ─────────────────────────────────────────────────────────────
# Pipeline PR : déclenché sur chaque Pull Request vers main
# Conditions de merge : au moins 1 review + tous les tests verts
# ─────────────────────────────────────────────────────────────
name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/akkor-hotel-test
          JWT_SECRET: test_secret_ci
          NODE_ENV: test
