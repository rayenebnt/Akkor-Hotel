openapi: 3.0.0

info:
  title: Akkor Hotel API
  version: 1.0.0
  description: Hotel reservation API with JWT authentication

servers:
  - url: http://localhost:3000

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        pseudo:
          type: string
        role:
          type: string

    Hotel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        description:
          type: string
        picture_list:
          type: array
          items:
            type: string

    Reservation:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        hotelId:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date

paths:

# =========================
# USERS
# =========================

  /users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: user@test.com
                pseudo:
                  type: string
                  example: user
                password:
                  type: string
                  example: "123456"
      responses:
        "201":
          description: User created
        "400":
          description: Invalid data

  /users/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@test.com
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: JWT token returned
        "401":
          description: Invalid credentials

  /users/{id}:
    get:
      summary: Get user by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
        "403":
          description: Forbidden

    put:
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User updated
        "403":
          description: Forbidden

    delete:
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
        "403":
          description: Forbidden

# =========================
# HOTELS
# =========================

  /hotels:

    get:
      summary: List hotels
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            example: 10
        - in: query
          name: sort
          schema:
            type: string
            example: name
      responses:
        "200":
          description: List of hotels

    post:
      summary: Create hotel (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Hotel"
      responses:
        "201":
          description: Hotel created
        "403":
          description: Admin access required

  /hotels/{id}:

    get:
      summary: Get hotel by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hotel found
        "404":
          description: Hotel not found

    put:
      summary: Update hotel (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hotel updated
        "403":
          description: Admin required

    delete:
      summary: Delete hotel (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hotel deleted
        "403":
          description: Admin required

# =========================
# RESERVATIONS
# =========================

  /reservations:

    get:
      summary: Get reservations of logged user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reservation list
        "401":
          description: Unauthorized

    post:
      summary: Create reservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hotelId:
                  type: string
                  example: 64a123456789
                dateFrom:
                  type: string
                  format: date
                  example: 2025-01-01
                dateTo:
                  type: string
                  format: date
                  example: 2025-01-05
      responses:
        "201":
          description: Reservation created
        "401":
          description: Unauthorized

  /reservations/{id}:

    put:
      summary: Update reservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reservation updated
        "403":
          description: Forbidden

    delete:
      summary: Delete reservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reservation deleted
        "403":
          description: Forbidden

  /reservations/search:
    get:
      summary: Admin search reservation by user email
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            example: user@test.com
      responses:
        "200":
          description: Reservation list
        "404":
          description: User not found