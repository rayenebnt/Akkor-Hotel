name: CI/CD Frontend

on:
  push:
    branches: [main]

jobs:
  # ── 1. TESTS ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # ── 2. SÉCURITÉ ───────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── 3. BUILD ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akkor-hotel-frontend
          path: dist/
          retention-days: 7

  # ── 4. DEPLOY ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to production
        run: |
          echo "========================================"
          echo "  Deploying Akkor Hotel Frontend"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Date   : $(date)"
          echo "========================================"
          echo "Deployment successful!"