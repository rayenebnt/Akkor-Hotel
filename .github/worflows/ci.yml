name: Akkor Hotel CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:


jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3


      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18


      - name: Install dependencies
        run: |
          cd backend
          npm install


      - name: Run tests
        run: |
          cd backend
          npm test


      - name: Security audit
        run: |
          cd backend
          npm audit


      - name: Build step
        run: echo "Build successful"


      - name: Deploy step
        run: echo "Deployment simulated"